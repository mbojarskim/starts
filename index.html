<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timer Start - DZIAŁA!</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        
        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            text-align: center;
            color: #e94560;
        }
        
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        
        .race-control {
            background: #1e293b;
            border-radius: 60px;
            padding: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        
        .race-btn {
            background: #334155;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            width: 64px;
            height: 64px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .race-btn:active {
            transform: scale(0.95);
            background: #475569;
        }
        
        .race-number {
            font-size: 3rem;
            font-weight: bold;
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 40px;
            min-width: 120px;
            text-align: center;
            color: #e94560;
            letter-spacing: 4px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #e94560, #c71a3a);
            color: white;
            border: none;
            padding: 24px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: all 0.1s ease;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.3);
        }
        
        .start-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.3);
        }
        
        .last-time {
            background: #0f172a;
            padding: 0.75rem;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 1.1rem;
        }
        
        .last-time span {
            color: #e94560;
            font-size: 1.4rem;
            font-weight: bold;
        }
        
        .status {
            background: #1e293b;
            padding: 0.75rem;
            border-radius: 16px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            word-break: break-all;
        }
        
        .status.connected {
            background: #064e3b;
            color: #34d399;
        }
        
        .status.error {
            background: #7f1d1d;
            color: #fca5a5;
        }
        
        .config-panel {
            background: #1e293b;
            padding: 1rem;
            border-radius: 24px;
            margin-top: 1rem;
        }
        
        .config-panel input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        
        .config-panel label {
            font-size: 0.8rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 5px;
        }
        
        .save-config {
            background: #3b82f6;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 8px;
            width: 100%;
            border: none;
            color: white;
            cursor: pointer;
        }
        
        .save-config:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔫 START</h1>
        <div class="subtitle">System pomiaru czasu</div>
        
        <!-- Sterowanie numerem biegu -->
        <div class="race-control">
            <button class="race-btn" id="minusBtn">−</button>
            <div class="race-number" id="raceNumber">1</div>
            <button class="race-btn" id="plusBtn">+</button>
        </div>
        
        <!-- Przycisk START -->
        <button class="start-btn" id="startBtn">▶ START</button>
        
        <!-- Ostatni zapisany czas -->
        <div class="last-time">
            🕐 Ostatni start: <span id="lastTime">---</span>
        </div>
        
        <!-- Status połączenia -->
        <div class="status" id="status">
            ⚡ Wpisz adres serwera i kliknij "Testuj"
        </div>
        
        <!-- Panel konfiguracji serwera -->
        <div class="config-panel">
            <label>📡 Adres komputera (IP:port)</label>
            <input type="text" id="serverUrl" placeholder="np. 192.168.1.100:3000">
            <button class="save-config" id="testBtn">🔌 Testuj połączenie</button>
            <button class="save-config" id="saveConfigBtn" style="background:#22c55e; margin-top:5px;">💾 Zapisz konfigurację</button>
        </div>
    </div>

    <script>
        // --- Zmienne ---
        let currentRaceNumber = 1;
        let serverBaseUrl = localStorage.getItem('timerServerUrl') || '';
        
        // --- Elementy DOM ---
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');
        const raceNumberSpan = document.getElementById('raceNumber');
        const startBtn = document.getElementById('startBtn');
        const lastTimeSpan = document.getElementById('lastTime');
        const statusDiv = document.getElementById('status');
        const serverUrlInput = document.getElementById('serverUrl');
        const testBtn = document.getElementById('testBtn');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        
        // --- Wczytaj zapisaną konfigurację ---
        if (serverBaseUrl) {
            serverUrlInput.value = serverBaseUrl;
            statusDiv.innerHTML = `📡 Zapisan adres: ${serverBaseUrl}<br>Kliknij "Testuj" aby sprawdzić`;
        }
        
        // --- Aktualizacja wyświetlania numeru biegu ---
        function updateRaceDisplay() {
            raceNumberSpan.textContent = currentRaceNumber;
        }
        
        // --- Funkcja do odtwarzania dźwięku startu ---
        function playStartSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                
                const now = audioCtx.currentTime;
                oscillator.start(now);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 1);
                oscillator.stop(now + 0.3);
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch(e) {
                console.warn("Dźwięk:", e);
            }
        }
        
        // --- Pobieranie aktualnego czasu HH:MM:SS.mmm ---
        function getFormattedTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ms = now.getMilliseconds().toString().padStart(3, '0');
            return `${hours}:${minutes}:${seconds}.${ms}`;
        }
        
        // --- Funkcja do budowania URL ---
        function buildUrl(endpoint) {
            let base = serverBaseUrl;
            if (!base) return null;
            
            // Usuń protokół jeśli jest
            base = base.replace(/^https?:\/\//, '');
            // Usuń końcowy slash
            base = base.replace(/\/$/, '');
            
            return `http://${base}${endpoint}`;
        }
        
        // --- TEST połączenia ---
        async function testConnection() {
            const inputUrl = serverUrlInput.value.trim();
            if (!inputUrl) {
                statusDiv.innerHTML = '❌ Wpisz adres serwera! (np. 192.168.1.100:3000)';
                statusDiv.className = 'status error';
                return false;
            }
            
            // Tymczasowo użyj wpisanego adresu do testu
            let testUrl = inputUrl;
            testUrl = testUrl.replace(/^https?:\/\//, '');
            testUrl = testUrl.replace(/\/$/, '');
            testUrl = `http://${testUrl}/api/starts`;
            
            statusDiv.innerHTML = '🔄 Testowanie połączenia...';
            statusDiv.className = 'status';
            
            try {
                const response = await fetch(testUrl, { method: 'GET' });
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = `✅ POŁĄCZONO! Serwer odpowiada. Odebrano ${data.length} startów.`;
                    statusDiv.className = 'status connected';
                    return true;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDiv.innerHTML = `❌ BRAK POŁĄCZENIA!<br>Sprawdź: 1) Czy serwer działa (node server.js)? 2) Czy adres ${inputUrl} jest poprawny? 3) Czy telefon w tej samej WiFi?`;
                statusDiv.className = 'status error';
                return false;
            }
        }
        
        // --- Zapis konfiguracji ---
        function saveConfig() {
            const newUrl = serverUrlInput.value.trim();
            if (!newUrl) {
                statusDiv.innerHTML = '❌ Wpisz adres serwera przed zapisem!';
                return;
            }
            
            serverBaseUrl = newUrl;
            localStorage.setItem('timerServerUrl', serverBaseUrl);
            statusDiv.innerHTML = `💾 Zapisano adres: ${serverBaseUrl}<br>Kliknij "Testuj" aby sprawdzić połączenie`;
            statusDiv.className = 'status';
        }
        
        // --- WYSYŁANIE STARTU ---
        async function sendStart() {
            if (!serverBaseUrl) {
                statusDiv.innerHTML = '❌ Najpierw wpisz adres serwera i kliknij "Zapisz konfigurację"!';
                statusDiv.className = 'status error';
                return;
            }
            
            const url = buildUrl('/api/start');
            if (!url) {
                statusDiv.innerHTML = '❌ Błędny adres serwera!';
                return;
            }
            
            const currentTime = getFormattedTime();
            
            // Odtwórz dźwięk
            playStartSound();
            
            // Wyświetl lokalnie
            lastTimeSpan.innerHTML = `${currentTime} (Bieg ${currentRaceNumber})`;
            
            statusDiv.innerHTML = '📤 Wysyłanie na komputer...';
            statusDiv.className = 'status';
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        raceNumber: currentRaceNumber,
                        time: currentTime,
                        timestamp: new Date().toISOString()
                    })
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = `✅ WYSŁANO! Bieg ${currentRaceNumber} o godzinie ${currentTime}`;
                    statusDiv.className = 'status connected';
                    
                    if (navigator.vibrate) {
                        navigator.vibrate(100);
                    }
                    
                    // Po 2 sekundach wróć do normalnego statusu
                    setTimeout(() => {
                        if (statusDiv.innerHTML.includes('WYSŁANO')) {
                            statusDiv.innerHTML = `✅ Gotowy. Serwer: ${serverBaseUrl}`;
                            statusDiv.className = 'status connected';
                        }
                    }, 2000);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('Błąd:', error);
                statusDiv.innerHTML = `❌ BŁĄD WYSYŁANIA!<br>Sprawdź czy serwer działa (node server.js)`;
                statusDiv.className = 'status error';
            }
        }
        
        // --- Zmiana numeru biegu ---
        function changeRace(delta) {
            let newValue = currentRaceNumber + delta;
            if (newValue < 1) newValue = 1;
            if (newValue > 99) newValue = 99;
            currentRaceNumber = newValue;
            updateRaceDisplay();
        }
        
        // --- Event Listeners ---
        minusBtn.addEventListener('click', () => changeRace(-1));
        plusBtn.addEventListener('click', () => changeRace(1));
        startBtn.addEventListener('click', sendStart);
        testBtn.addEventListener('click', testConnection);
        saveConfigBtn.addEventListener('click', saveConfig);
        
        // --- Inicjalizacja ---
        updateRaceDisplay();
    </script>
</body>
</html>
