<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timer Start - Wysyłanie na komputer</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        
        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            text-align: center;
            color: #e94560;
        }
        
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        
        .race-control {
            background: #1e293b;
            border-radius: 60px;
            padding: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        
        .race-btn {
            background: #334155;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            width: 64px;
            height: 64px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .race-btn:active {
            transform: scale(0.95);
            background: #475569;
        }
        
        .race-number {
            font-size: 3rem;
            font-weight: bold;
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 40px;
            min-width: 120px;
            text-align: center;
            color: #e94560;
            letter-spacing: 4px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #e94560, #c71a3a);
            color: white;
            border: none;
            padding: 24px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: all 0.1s ease;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.3);
        }
        
        .start-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.3);
        }
        
        .last-time {
            background: #0f172a;
            padding: 0.75rem;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 1.1rem;
        }
        
        .last-time span {
            color: #e94560;
            font-size: 1.4rem;
            font-weight: bold;
        }
        
        .status {
            background: #1e293b;
            padding: 0.75rem;
            border-radius: 16px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            word-break: break-all;
        }
        
        .status.connected {
            background: #064e3b;
            color: #34d399;
        }
        
        .status.error {
            background: #7f1d1d;
            color: #fca5a5;
        }
        
        .config-panel {
            background: #1e293b;
            padding: 1rem;
            border-radius: 24px;
            margin-top: 1rem;
        }
        
        .config-panel input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .config-panel label {
            font-size: 0.8rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 5px;
        }
        
        .save-config {
            background: #3b82f6;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔫 START</h1>
        <div class="subtitle">System pomiaru czasu</div>
        
        <!-- Sterowanie numerem biegu -->
        <div class="race-control">
            <button class="race-btn" id="minusBtn">−</button>
            <div class="race-number" id="raceNumber">1</div>
            <button class="race-btn" id="plusBtn">+</button>
        </div>
        
        <!-- Przycisk START -->
        <button class="start-btn" id="startBtn">▶ START</button>
        
        <!-- Ostatni zapisany czas -->
        <div class="last-time">
            🕐 Ostatni start: <span id="lastTime">---</span>
        </div>
        
        <!-- Status połączenia -->
        <div class="status" id="status">
            ⚡ Konfiguracja...
        </div>
        
        <!-- Panel konfiguracji serwera -->
        <div class="config-panel">
            <label>📡 Adres komputera (IP:port)</label>
            <input type="text" id="serverUrl" placeholder="np. 192.168.1.100:3000" value="192.168.1.100:3000">
            <button class="save-config" id="saveConfigBtn">💾 Zapisz i testuj</button>
        </div>
    </div>

    <script>
        // --- Konfiguracja ---
        let currentRaceNumber = 1;
        let lastSentTime = null;
        let serverBaseUrl = localStorage.getItem('serverUrl') || '';
        
        // --- Elementy DOM ---
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');
        const raceNumberSpan = document.getElementById('raceNumber');
        const startBtn = document.getElementById('startBtn');
        const lastTimeSpan = document.getElementById('lastTime');
        const statusDiv = document.getElementById('status');
        const serverUrlInput = document.getElementById('serverUrl');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        
        // --- Wczytaj zapisaną konfigurację ---
        if (serverBaseUrl) {
            serverUrlInput.value = serverBaseUrl;
        }
        
        // --- Aktualizacja wyświetlania numeru biegu ---
        function updateRaceDisplay() {
            raceNumberSpan.textContent = currentRaceNumber;
        }
        
        // --- Funkcja do odtwarzania dźwięku startu ---
        function playStartSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                
                const now = audioCtx.currentTime;
                oscillator.start(now);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 1);
                oscillator.stop(now + 0.3);
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch(e) {
                console.warn("Dźwięk niedostępny", e);
            }
        }
        
        // --- Pobieranie aktualnego czasu HH:MM:SS.mmm ---
        function getFormattedTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ms = now.getMilliseconds().toString().padStart(3, '0');
            return `${hours}:${minutes}:${seconds}.${ms}`;
        }
        
        // --- WYSYŁANIE DANYCH DO KOMPUTERA ---
        async function sendToComputer(raceNumber, time) {
            if (!serverBaseUrl) {
                statusDiv.textContent = '❌ Brak adresu serwera! Wpisz IP komputera';
                statusDiv.className = 'status error';
                return false;
            }
            
            // Upewnij się, że URL ma protokół
            let url = serverBaseUrl;
            if (!url.startsWith('http')) {
                url = 'http://' + url;
            }
            url = url.replace(/\/$/, '') + '/api/start';
            
            try {
                statusDiv.textContent = '📤 Wysyłanie...';
                statusDiv.className = 'status';
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        raceNumber: raceNumber,
                        time: time,
                        timestamp: new Date().toISOString()
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.textContent = '✅ Wysłano! Czas zapisany na komputerze';
                    statusDiv.className = 'status connected';
                    
                    // Dodaj małe opóźnienie przed zmianą koloru
                    setTimeout(() => {
                        if (statusDiv.textContent === '✅ Wysłano! Czas zapisany na komputerze') {
                            statusDiv.className = 'status';
                            statusDiv.textContent = '✅ Gotowy do następnego startu';
                        }
                    }, 2000);
                    
                    return true;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                console.error('Błąd wysyłania:', error);
                statusDiv.textContent = `❌ Błąd: Nie mogę połączyć się z ${serverBaseUrl}. Sprawdź czy: 1) Serwer działa, 2) Telefon jest w tej samej sieci WiFi, 3) IP jest poprawne`;
                statusDiv.className = 'status error';
                return false;
            }
        }
        
        // --- Test połączenia z serwerem ---
        async function testConnection() {
            if (!serverBaseUrl) {
                statusDiv.textContent = '⚠️ Wpisz adres serwera i kliknij "Zapisz i testuj"';
                return false;
            }
            
            let url = serverBaseUrl;
            if (!url.startsWith('http')) url = 'http://' + url;
            url = url.replace(/\/$/, '') + '/api/starts';
            
            try {
                const response = await fetch(url, { method: 'GET' });
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.textContent = `✅ Połączono! Odebrano ${data.length} startów (serwer działa)`;
                    statusDiv.className = 'status connected';
                    return true;
                } else {
                    throw new Error('Błąd odpowiedzi');
                }
            } catch (error) {
                statusDiv.textContent = `❌ Brak połączenia - czy serwer jest uruchomiony? (node server.js)`;
                statusDiv.className = 'status error';
                return false;
            }
        }
        
        // --- GŁÓWNA AKCJA STARTU ---
        async function onStart() {
            // 1. Dźwięk
            playStartSound();
            
            // 2. Pobierz czas
            const currentTime = getFormattedTime();
            
            // 3. Wyświetl lokalnie
            lastTimeSpan.textContent = `${currentTime} (Bieg ${currentRaceNumber})`;
            
            // 4. WYŚLIJ na komputer
            const success = await sendToComputer(currentRaceNumber, currentTime);
            
            // 5. Wibracja
            if (success && navigator.vibrate) {
                navigator.vibrate(100);
            }
            
            console.log(`Start: Bieg ${currentRaceNumber}, Czas: ${currentTime}, Wysłano: ${success}`);
        }
        
        // --- Zmiana numeru biegu ---
        function changeRace(delta) {
            let newValue = currentRaceNumber + delta;
            if (newValue < 1) newValue = 1;
            if (newValue > 99) newValue = 99;
            currentRaceNumber = newValue;
            updateRaceDisplay();
        }
        
        // --- Zapis konfiguracji ---
        function saveConfig() {
            let newUrl = serverUrlInput.value.trim();
            // Usuń protokół jeśli ktoś wpisał
            newUrl = newUrl.replace(/^https?:\/\//, '');
            serverBaseUrl = newUrl;
            localStorage.setItem('serverUrl', serverBaseUrl);
            
            statusDiv.textContent = '🔄 Zapisanow
            setTimeout(() => testConnection(), 500);
        }
        
        // --- Event Listeners ---
        minusBtn.addEventListener('click', () => changeRace(-1));
        plusBtn.addEventListener('click', () => changeRace(1));
        startBtn.addEventListener('click', onStart);
        saveConfigBtn.addEventListener('click', saveConfig);
        
        // Test połączenia przy starcie
        setTimeout(() => {
            if (serverBaseUrl) testConnection();
        }, 1000);
        
        // Inicjalizacja
        updateRaceDisplay();
        statusDiv.textContent = '⚡ Skonfiguruj adres IP komputera';
    </script>
</body>
</html>
